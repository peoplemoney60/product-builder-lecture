<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Light Mode</button>
    </div>
    <div class="container">
        <header>
            <h1>Lotto Number Picker</h1>
        </header>
        <main>
            <div id="number-display" class="number-display"></div>
            <button id="generate-btn" class="generate-btn">Generate Numbers</button>
        </main>
        <section class="partnership-section">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/xeewarbz" method="POST">
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </section>
        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-52epezqran.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
